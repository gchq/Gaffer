version: '3.4'

services:
  gaffer-rest:
    image: gchq/gaffer-rest:2.1.0-accumulo-2.0.1
    network_mode: "host"
    depends_on:
      - jaeger
    #environment:
      # - OTEL_TRACES_EXPORTER=logging
      # - OTEL_METRICS_EXPORTER=logging
      # - OTEL_LOGS_EXPORTER=logging
      # - OTEL_EXPORTER_OTLP_TRACES_PROTOCOL=grpc
      # - OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=http://127.0.0.1:4317
      #- OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
    ports:
      - "8080:8080"
    volumes:
      - ./rest-api/spring-rest/target/spring-rest-2.1.1-SNAPSHOT-exec.jar:/gaffer/jars/rest.jar
  jaeger:
    image: jaegertracing/all-in-one:latest
    network_mode: "host"
    environment:
      - COLLECTOR_ZIPKIN_HTTP_PORT=9411
    ports:
      - "6831:6831/udp"
      - "6832:6832/udp"
      - "5778:5778"
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
      - "14250:14250"
      - "14268:14268"
      - "14269:14269"
      - "9411:9411"
